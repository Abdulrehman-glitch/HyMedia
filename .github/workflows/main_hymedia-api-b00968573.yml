name: Build and deploy HyMedia backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'Hymedia_codebase/backend/**'
      - '.github/workflows/main_hymedia-api-b00968573.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install backend dependencies
        working-directory: Hymedia_codebase/backend
        run: npm ci

      - name: Check backend syntax
        working-directory: Hymedia_codebase/backend
        run: npm run check

      - name: Run backend build if present
        working-directory: Hymedia_codebase/backend
        run: npm run build --if-present

      - name: Run backend tests
        working-directory: Hymedia_codebase/backend
        run: npm test

      - name: Audit backend dependencies
        working-directory: Hymedia_codebase/backend
        run: npm audit --audit-level=high

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymedia-backend
          path: Hymedia_codebase/backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://hymedia-api-b00968573-ajegdnfpa9braqet.italynorth-01.azurewebsites.net

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: hymedia-backend
          path: hymedia-backend

      - name: Create backend deployment package
        run: |
          cd hymedia-backend
          zip -r ../hymedia-backend.zip .

      - name: Deploy backend to Azure Web App
        env:
          PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_HYMEDIA_API }}
        run: |
          python - <<'PY'
          import base64
          import os
          import urllib.request
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profile = next(
              item for item in root.findall("publishProfile")
              if item.attrib.get("publishMethod") == "ZipDeploy"
          )
          host = profile.attrib["publishUrl"].replace("https://", "").split("/")[0]
          url = f"https://{host}/api/zipdeploy?isAsync=false"
          username = profile.attrib["userName"]
          password = profile.attrib["userPWD"]

          with open("hymedia-backend.zip", "rb") as package:
              request = urllib.request.Request(url, data=package.read(), method="POST")

          token = base64.b64encode(f"{username}:{password}".encode()).decode()
          request.add_header("Authorization", f"Basic {token}")
          request.add_header("Content-Type", "application/zip")

          with urllib.request.urlopen(request, timeout=900) as response:
              print(f"Kudu ZipDeploy completed with HTTP {response.status}")
          PY

      - name: Smoke check backend health
        run: curl --fail --retry 5 --retry-delay 10 https://hymedia-api-b00968573-ajegdnfpa9braqet.italynorth-01.azurewebsites.net/api/v1/health
