name: Build and deploy HyMedia backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'CW2_HyMedia_Implementation/backend/**'
      - '.github/workflows/main_hymedia-api-b00968573.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install backend dependencies
        working-directory: CW2_HyMedia_Implementation/backend
        run: npm install

      - name: Run backend build if present
        working-directory: CW2_HyMedia_Implementation/backend
        run: npm run build --if-present

      - name: Run backend tests if present
        working-directory: CW2_HyMedia_Implementation/backend
        run: npm run test --if-present

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymedia-backend
          path: CW2_HyMedia_Implementation/backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: hymedia-backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F7FFD0BD96FB45CE82A3C5F9B0180DE8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9B35277FC2724A10A87DFBEFD9D4CFA0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B9A2A0AB87614218A5A943C6C7F5E5DB }}

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hymedia-api-b00968573'
          slot-name: 'Production'
          package: .
