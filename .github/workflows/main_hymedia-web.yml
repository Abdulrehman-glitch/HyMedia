name: Build and deploy HyMedia frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'CW2_HyMedia_Implementation/frontend/**'
      - '.github/workflows/main_hymedia-web.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install frontend dependencies
        working-directory: CW2_HyMedia_Implementation/frontend
        run: npm install

      - name: Run frontend build if present
        working-directory: CW2_HyMedia_Implementation/frontend
        run: npm run build --if-present

      - name: Run frontend tests if present
        working-directory: CW2_HyMedia_Implementation/frontend
        run: npm run test --if-present

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymedia-frontend
          path: CW2_HyMedia_Implementation/frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: hymedia-frontend

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hymedia-web'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C3E5DB1CBC0348CD8D1529AC56C12CFA }}
