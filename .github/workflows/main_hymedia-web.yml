name: Build and deploy HyMedia frontend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'Hymedia_codebase/frontend/**'
      - '.github/workflows/main_hymedia-web.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install frontend dependencies
        working-directory: Hymedia_codebase/frontend
        run: npm install

      - name: Run frontend build if present
        working-directory: Hymedia_codebase/frontend
        run: npm run build --if-present

      - name: Run frontend tests if present
        working-directory: Hymedia_codebase/frontend
        run: npm run test --if-present

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: hymedia-frontend
          path: Hymedia_codebase/frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: hymedia-frontend
          path: hymedia-frontend

      - name: Create frontend deployment package
        run: |
          cd hymedia-frontend
          zip -r ../hymedia-frontend.zip .

      - name: Deploy frontend to Azure Web App
        env:
          PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C3E5DB1CBC0348CD8D1529AC56C12CFA }}
        run: |
          python - <<'PY'
          import base64
          import os
          import urllib.request
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profile = next(
              item for item in root.findall("publishProfile")
              if item.attrib.get("publishMethod") == "ZipDeploy"
          )
          host = profile.attrib["publishUrl"].replace("https://", "").split("/")[0]
          url = f"https://{host}/api/zipdeploy?isAsync=false"
          username = profile.attrib["userName"]
          password = profile.attrib["userPWD"]

          with open("hymedia-frontend.zip", "rb") as package:
              request = urllib.request.Request(url, data=package.read(), method="POST")

          token = base64.b64encode(f"{username}:{password}".encode()).decode()
          request.add_header("Authorization", f"Basic {token}")
          request.add_header("Content-Type", "application/zip")

          with urllib.request.urlopen(request, timeout=900) as response:
              print(f"Kudu ZipDeploy completed with HTTP {response.status}")
          PY
